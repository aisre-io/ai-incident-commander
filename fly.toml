[build]
builder = "DOCKERFILE"
dockerfile = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
healthcheckPath = "/health"
healthcheckTimeout = 5
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[deploy.env]]
key = "APP_ENV"
value = "production"
sensitive = false

[[deploy.env]]
key = "LOG_LEVEL"
value = "INFO"
sensitive = false

# The following are sensitive — set via `fly secrets set`:
#   DEEPSEEK_API_KEY
#   LARK_WEBHOOK_URL
#   GITHUB_TOKEN
#   PAGERDUTY_API_KEY
#   OPSGENIE_API_KEY
